<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Export Control Center - Oman Cargo Movers v2</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .stage-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .stage-card.active { transform: scale(1.02); }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-[#020617] text-[#0f172a] dark:text-slate-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        
        <!-- Premium Sidebar -->
        <aside class="w-80 hidden lg:flex flex-col bg-white dark:bg-[#0f172a] border-r border-slate-100 dark:border-slate-800 p-8 overflow-y-auto custom-scrollbar">
            <div class="flex items-center gap-4 mb-16">
                <div class="size-11 rounded-2xl bg-[#1e40af] flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="material-symbols-rounded text-white">local_shipping</span>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter leading-none dark:text-white uppercase">Oman Cargo</h1>
                    <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Premium Ops</p>
                </div>
            </div>

            <nav class="space-y-1.5 flex-1">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6 px-2">Operational Pipeline</p>
                <div id="side-workflow" class="space-y-1">
                    <!-- Dynamic Side Timeline Nodes -->
                </div>
            </nav>

            <div class="pt-10 border-t border-slate-100 dark:border-slate-800">
                <button class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-all font-bold text-sm">
                    <span class="material-symbols-rounded">logout</span>
                    <span>Terminate Session</span>
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50/50 dark:bg-[#020617]">
            <header class="h-20 border-b border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-[#0f172a]/80 backdrop-blur-md flex items-center justify-between px-10 shrink-0">
                <div class="flex flex-col gap-1">
                    <div class="flex items-center gap-3">
                         <span id="job-id-header" class="text-sm font-black text-[#1e40af] uppercase tracking-widest">ID: OCM-EXP-2024-0892</span>
                         <span class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 text-[9px] font-black uppercase tracking-widest border border-emerald-200">Synchronized</span>
                    </div>
                </div>
                <div class="flex items-center gap-5">
                    <div class="text-right">
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Account Manager</p>
                        <p class="text-[11px] font-bold uppercase tracking-tight">Admin John Doe</p>
                    </div>
                    <div class="size-11 rounded-2xl border border-slate-100 dark:border-slate-800 p-1 bg-white dark:bg-slate-900 shadow-sm">
                        <img src="https://i.pravatar.cc/150?u=admin" class="w-full h-full rounded-xl object-cover shadow-sm">
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-12 lg:p-20 custom-scrollbar">
                <div class="max-w-5xl mx-auto space-y-16">
                    
                    <!-- Horizontal Multi-Stage Progress -->
                    <div id="top-progress" class="flex items-center justify-between gap-2 overflow-x-auto pb-4 custom-scrollbar">
                        <!-- Dynamic Progress Nodes -->
                    </div>

                    <!-- Dynamic Stage Context -->
                    <div id="stage-viewport" class="card relative overflow-hidden dark:bg-[#0f172a] dark:border-slate-800 min-h-[600px] flex flex-col">
                        <div class="absolute top-0 left-0 w-full h-1.5 bg-[#1e40af]"></div>
                        
                        <div id="stage-meta" class="mb-14 relative z-10">
                            <!-- Dynamic Stage Header -->
                        </div>

                        <form id="workflow-form" class="space-y-12 flex-1 relative z-10">
                            <!-- Dynamic Form Structure -->
                        </form>

                        <div class="mt-16 pt-10 border-t border-slate-50 dark:border-slate-800 flex items-center justify-between shrink-0 relative z-10">
                            <button id="prev-stage-btn" onclick="navStage(currentStageIndex - 1)" class="px-10 py-4 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-[1.25rem] text-xs font-black uppercase tracking-widest hover:bg-slate-200 transition-all">Previous Sequence</button>
                            <button id="next-stage-btn" onclick="commitStage()" class="btn-primary px-16 shadow-2xl">Finalize & Progress Sequence</button>
                        </div>

                        <!-- Abstract Background Decoration -->
                        <div class="absolute bottom-[-100px] right-[-100px] opacity-[0.03] dark:opacity-[0.02]">
                            <span class="material-symbols-rounded text-[400px] select-none pointer-events-none">package_2</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const workflowDock = [
            { id: 1, name: 'Invoice Receipt', icon: 'receipt_long', desc: 'Financial verification of the export movement', fields: ['Invoice No', 'Invoice Base Date', 'Tonnage (MT)', 'Target Commodity', 'Strategic Client Ref', 'Attachment Slot (PDF)'] },
            { id: 2, name: 'Custom Checklist', icon: 'rule', desc: 'Regulatory compliance & verification protocol', fields: ['Checklist Items Validation', 'Completion Status', 'Assigned Inspector', 'Execution Date', 'Strategic Remarks'] },
            { id: 3, name: 'Cargo Arrival', icon: 'conveyor_belt', desc: 'Physical inflow at port/cfs terminal', fields: ['Physical Arrival TS', 'Actual Net Weight', 'Vehicle Identifier', 'Logistics Operator Info', 'Initial Cargo Health'] },
            { id: 4, name: 'CFS Allocation', icon: 'location_on', fields: ['CFS Provider Name', 'Designated Location', 'Account Point of Contact', 'Warehouse Comms No', 'Target ETA at CFS'] },
            { id: 5, name: 'Daily Carting', icon: 'local_shipping', fields: ['Deployment Date', 'Vehicle Count', 'Movement Tonnage', 'Unit Identifiers (List)', 'Time-In/Out Tracking', 'Remaining Capacity'] },
            { id: 6, name: 'Booking & Hub', icon: 'inventory_2', fields: ['Shipping Line Ent', 'Target Vessel', 'Booking Anchor Ref', 'Execution Date', 'Unit Specification (20ft/40ft)', 'Strategic Seal Number'] },
            { id: 7, name: 'Gate-In Protocol', icon: 'login', fields: ['Protocol Execution Date', 'Gate TS (Time)', 'Gate Pass Identifier', 'Deployment Status Confirmation'] },
            { id: 8, name: 'Onboard Launch', icon: 'directions_boat', fields: ['Strategic Onboard Date', 'Vessel Confirmation', 'Bill of Lading Anchor', 'Mission Completion Status'] }
        ];

        let currentStageIndex = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id') || 'OCM-EXP-2024-0892';

        function initApp() {
            document.getElementById('job-id-header').textContent = `Job Anchor: ${jobId}`;
            renderUI();
        }

        function renderUI() {
            renderTopNav();
            renderSideNav();
            loadStage(currentStageIndex);
        }

        function renderTopNav() {
            const container = document.getElementById('top-progress');
            container.innerHTML = workflowDock.map((s, i) => `
                <div class="flex-1 min-w-[100px] group cursor-pointer" onclick="navStage(${i})">
                    <div class="h-2 rounded-full mb-3 shadow-inner ${i < currentStageIndex ? 'bg-emerald-500' : (i === currentStageIndex ? 'bg-[#1e40af]' : 'bg-slate-200 dark:bg-slate-800')}"></div>
                    <p class="text-[9px] font-black uppercase text-center tracking-tighter ${i === currentStageIndex ? 'text-[#1e40af]' : 'text-slate-400'}">${s.name.split(' ')[0]}</p>
                </div>
            `).join('');
        }

        function renderSideNav() {
            const container = document.getElementById('side-workflow');
            container.innerHTML = workflowDock.map((s, i) => `
                <button onclick="navStage(${i})" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl transition-all ${i === currentStageIndex ? 'bg-blue-50 dark:bg-blue-900/10 text-[#1e40af] shadow-sm' : 'text-slate-400 hover:text-slate-600'}">
                    <div class="size-6 rounded-lg ${i === currentStageIndex ? 'bg-[#1e40af] text-white shadow-lg' : 'bg-slate-50 dark:bg-slate-800'} flex items-center justify-center text-[10px] font-black">
                        ${s.id}
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-widest">${s.name}</span>
                </button>
            `).join('');
        }

        function loadStage(index) {
            currentStageIndex = index;
            const stage = workflowDock[index];
            
            // Meta Section
            document.getElementById('stage-meta').innerHTML = `
                <div class="flex flex-col gap-4">
                    <div class="inline-flex items-center gap-3">
                        <span class="px-4 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-[#1e40af] text-[9px] font-black uppercase tracking-widest rounded-full border border-blue-100 dark:border-blue-800">Operational Sequence ${stage.id} OF 8</span>
                        <div class="flex items-center gap-2 text-emerald-500 text-[10px] uppercase font-black"><span class="size-1.5 rounded-full bg-emerald-500"></span> Live Monitoring</div>
                    </div>
                    <h2 class="text-4xl font-black text-slate-900 dark:text-white tracking-tight">${stage.name}</h2>
                    <p class="text-slate-400 font-bold text-xs max-w-lg leading-relaxed">${stage.desc || ''}</p>
                </div>
            `;

            // Form Content
            const form = document.getElementById('workflow-form');
            form.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
                    ${stage.fields.map(f => `
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest block pl-1">${f}</label>
                            ${f.toLowerCase().includes('pdf') || f.toLowerCase().includes('slot') ? `
                                <div class="border-2 border-dashed border-slate-100 dark:border-slate-800 rounded-[1.5rem] p-10 text-center hover:border-blue-500 transition-all cursor-pointer group bg-slate-50/50 dark:bg-slate-900/30">
                                    <span class="material-symbols-rounded text-slate-200 group-hover:text-blue-500 text-3xl transition-colors">upload_file</span>
                                    <p class="text-[10px] font-bold text-slate-400 mt-2">LINK STRATEGIC REPORTING DOCUMENTS</p>
                                </div>
                            ` : `
                                <input type="text" placeholder="Specify ${f.toLowerCase()}..." class="input-field dark:bg-slate-900 dark:border-slate-800 font-bold tracking-tight">
                            `}
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('prev-stage-btn').style.visibility = index === 0 ? 'hidden' : 'visible';
            document.getElementById('next-stage-btn').textContent = index === workflowDock.length - 1 ? 'Finalize Project Lifecycle' : 'Finalize & Progress Sequence';

            renderTopNav();
            renderSideNav();
        }

        function navStage(index) {
            if(index >= 0 && index < workflowDock.length) loadStage(index);
        }

        function commitStage() {
            if(currentStageIndex < workflowDock.length - 1) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: `Sequence ${workflowDock[currentStageIndex].id} Successfully Commited`,
                    showConfirmButton: false,
                    timer: 1500,
                    customClass: { popup: 'premium-toast' }
                });
                navStage(currentStageIndex + 1);
            } else {
                Swal.fire({
                    title: 'Strategic Lifecycle Completed',
                    text: `Export Mission ${jobId} has reached final operational status.`,
                    icon: 'success',
                    confirmButtonColor: '#1e40af'
                });
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
