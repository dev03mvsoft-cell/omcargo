<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Oman Cargo Mover</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal; font-style: normal; font-size: 24px; line-height: 1;
            letter-spacing: normal; text-transform: none; display: inline-block;
            white-space: nowrap; word-wrap: normal; direction: ltr;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility; font-feature-settings: 'liga';
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e293b',
                        accent: '#3b82f6',
                        background: {
                            light: '#f8fafc',
                            dark: '#0f172a'
                        }
                    },
                    fontFamily: {
                        display: ['Public Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-display flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <!-- Background Accents -->
    <div class="absolute top-0 left-0 w-full h-full -z-10 bg-[radial-gradient(circle_at_50%_120%,#e2e8f0,transparent)]"></div>
    <div class="absolute -top-24 -left-24 size-96 bg-primary opacity-[0.03] rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 size-96 bg-accent opacity-[0.05] rounded-full blur-3xl"></div>

    <div class="w-full max-w-md">
        <!-- Logo/Header -->
        <div class="flex flex-col items-center gap-6 mb-12">
            <div class="size-16 rounded-3xl bg-primary flex items-center justify-center text-white shadow-2xl shadow-primary/30">
                <span class="material-symbols-outlined text-4xl">local_shipping</span>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Oman Cargo <span class="text-accent">Mover</span></h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Logistics Control Access</p>
            </div>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-2xl shadow-slate-200/50 p-10 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-slate-50 -mr-16 -mt-16 rounded-full opacity-50"></div>
            
            <form action="../../index.html" class="space-y-6 relative z-10">
                <!-- Username -->
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1">Authentication ID</label>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-accent transition-colors">person</span>
                        <input type="text" placeholder="username@omancargo.com" 
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-accent/10 focus:border-accent transition-all outline-none" required />
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Master Key</label>
                        <a href="#" class="text-[10px] font-black text-accent uppercase tracking-widest hover:underline">Recovery</a>
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-accent transition-colors">lock</span>
                        <input type="password" placeholder="••••••••••••" 
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold focus:ring-4 focus:ring-accent/10 focus:border-accent transition-all outline-none" required />
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="remember" class="size-4 text-accent border-slate-200 rounded-md focus:ring-accent/20 cursor-pointer">
                    <label for="remember" class="text-[11px] font-black text-slate-400 uppercase tracking-widest cursor-pointer select-none">Trust this device for 30 days</label>
                </div>

                <!-- Submit -->
                <button type="submit" 
                    class="w-full py-4 bg-primary text-white rounded-2xl text-xs font-black uppercase tracking-[0.2em] shadow-xl shadow-primary/30 hover:bg-accent hover:shadow-accent/40 transition-all duration-300 flex items-center justify-center gap-2 group">
                    Initialize Access
                    <span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1">arrow_forward</span>
                </button>
            </form>
        </div>

        <!-- Footer Info -->
        <p class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-10 opacity-60">
            Internal Operations Portal • v4.0.2<br/>
            © 2026 Oman Cargo Mover
        </p>
    </div>
</body>
</html>
